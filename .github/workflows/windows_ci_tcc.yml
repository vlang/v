name: CI Windows TCC

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '!**.bat'
      - '!**/windows_ci_tcc.yml'
      - 'cmd/tools/**'
      - '!cmd/tools/builders/**.v'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.yml'
      - '!**.bat'
      - '!**/windows_ci_tcc.yml'
      - '!**/windows-install-sqlite.bat'
      - 'cmd/tools/**'
      - '!cmd/tools/builders/**.v'

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref == 'refs/heads/master' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  tcc-windows:
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      VFLAGS: -cc tcc -no-retry-compilation
      VTEST_SHOW_LONGEST_BY_RUNTIME: 3
      VTEST_SHOW_LONGEST_BY_COMPTIME: 3
      VTEST_SHOW_LONGEST_BY_TOTALTIME: 3
    steps:
      - uses: actions/checkout@v6
      - name: Build with makev.bat -tcc
        run: |
          .\makev.bat -tcc
          .\v.exe symlink
      - name: All code is formatted
        run: v -silent test-cleancode
      - name: Test new v.c
        run: |
          v -o v.c cmd/v
          .\thirdparty\tcc\tcc.exe -Werror -w -ladvapi32 -lws2_32 -bt10 v.c
      - name: Diagnostic - validate exception handler + bypass it for ground truth
        # Last run printed: "Unhandled Exception 0x555b0 at e563b0" -- both fields
        # are nonsensical for real Windows SEH (code is not a standard SEH value,
        # address is in the low MB range). This step checks two things:
        #
        #  1. Validate handler with a known-good crash (div-by-zero, code 0xC0000094).
        #     If THAT shows correct values, the install-thirdparty crash is real but
        #     the EXCEPTION_RECORD memory is being corrupted by it. If THAT also
        #     shows weird values, our struct mirror (ExceptionRecord) is wrong.
        #
        #  2. Build v.exe with `-d no_backtrace`, which skips registering V's
        #     SetUnhandledExceptionFilter. Then Windows' default handler runs
        #     and prints the *real* exception code via Watson / event log.
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path probes2 | Out-Null
          # 1) control: trigger a *known* exception so we can compare field values.
          # Use a runtime-derived zero so V doesn't fold this at compile time.
          Set-Content -Encoding ascii probes2\divz.v "import os`nfn main() {`n  zero := os.args.len - os.args.len`n  println(100 / zero)`n}"
          Get-Content probes2\divz.v
          foreach ($cc in 'gcc','tcc') {
            $exe = "probes2\divz_${cc}.exe"
            Write-Host "==== build divz with $cc ===="
            v -cc $cc -g -o $exe probes2\divz.v
            if (Test-Path $exe) {
              Write-Host "==== run divz_${cc}.exe (expected: code 0xC0000094) ===="
              & $exe
              Write-Host "ExitCode: $LASTEXITCODE"
            } else { Write-Host "(no exe produced)" }
          }
          # 2) bypass V's handler entirely so Windows shows the real exception
          Write-Host "==== rebuild v with -d no_backtrace (bypass V's SEH filter) ===="
          v -cc gcc -d no_backtrace -o v_nobt.exe cmd/v
          if (Test-Path v_nobt.exe) {
            Write-Host "==== compile install_thirdparty_sqlite.vsh with v_nobt.exe ===="
            .\v_nobt.exe -cc gcc -g -stats -o probes2\full_nobt.exe vlib/db/sqlite/install_thirdparty_sqlite.vsh 2>&1
            Write-Host "ExitCode: $LASTEXITCODE"
          } else { Write-Host "(could not build v_nobt.exe)" }
          # 3) re-run the full failing compile under our (now verbose) handler to
          # see all 5 EXCEPTION_RECORD fields side by side.
          Write-Host "==== full vsh compile under verbose V handler (gcc-built v) ===="
          v -cc gcc -o v_gcc.exe cmd/v
          if (Test-Path v_gcc.exe) {
            .\v_gcc.exe -cc gcc -g -stats -o probes2\full_gcc.exe vlib/db/sqlite/install_thirdparty_sqlite.vsh
            Write-Host "ExitCode: $LASTEXITCODE"
          }
          # 4) check Windows Application event log for any v.exe / WerFault entries
          # in the last 10 minutes -- those carry the real ExceptionCode.
          Write-Host "==== last 30s of Application event log (Application Error / WerFault) ===="
          Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddMinutes(-10)} -ErrorAction SilentlyContinue |
            Where-Object { $_.ProviderName -in @('Application Error','Windows Error Reporting') } |
            Select-Object -First 5 TimeCreated, ProviderName, Message |
            Format-List
      - name: Install dependencies
        run: |
          v retry -- v setup-freetype
          .\.github\workflows\windows-install-sqlite.bat
      - name: v -g self
        run: v -g self
      - name: v doctor
        run: |
          v doctor
      - name: Verify `v test` works
        run: |
          v cmd/tools/test_if_v_test_system_works.v
          .\cmd\tools\test_if_v_test_system_works.exe
      - name: Verify `v vlib/v/gen/c/coutput_test.v` works
        run: v vlib/v/gen/c/coutput_test.v
      - name: Make sure running TCC64 instead of TCC32
        run: v test .github\workflows\make_sure_ci_run_with_64bit_compiler_test.v
      - name: Test ./v doc -v clipboard *BEFORE building tools*
        run: v doc -v clipboard
      - name: Test v build-tools
        run: v -silent -W build-tools
      - name: Test pure V math module
        run: v -silent -exclude @vlib/math/*.c.v test vlib/math/
      - name: Self tests
        run: v -silent test-self vlib
      - name: Test v->js
        run: v -o hi.js examples/js_hello_world.v && node hi.js
      - name: Test v binaries
        run: v build-vbinaries
      - name: Build examples
        run: v build-examples
      - name: v2 self compilation
        run: v -o v2.exe cmd/v && .\v2.exe -o v3.exe cmd/v && .\v3.exe -o v4.exe cmd/v
