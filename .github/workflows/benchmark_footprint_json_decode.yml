name: json decoder benchmark CI

on:
  push:
    branches:
      - master
    paths:
      - 'vlib/json2/**' # Trigger on changes in this folder

jobs:
  json-encode-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build V
        run: make -j4 && ./v symlink

      - name: Run V benchmark and save output
        run: (echo '```txt'; v -prod crun vlib/json2/tests/bench.v; echo '```') > vlib/json2/tests/bench_out.md

      - name: Upload result file
        uses: actions/upload-artifact@v7
        with:
          name: program-output
          path: vlib/json2/tests/bench_out.md
